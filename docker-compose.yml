services:
  codereviewagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codereviewagent
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      # Container-friendly defaults (override in .env if needed)
      PORT: "8080"
      GIN_MODE: release
      LOG_FORMAT: json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
