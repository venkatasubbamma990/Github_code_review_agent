services:
  redis:
    image: redis:7-alpine
    container_name: codereviewagent-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  codereviewagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codereviewagent
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
      GIN_MODE: release
      LOG_FORMAT: json
      REDIS_ADDR: redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
